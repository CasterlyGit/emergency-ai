# Fly.io app configuration for emergency-ai
# Deploy: fly deploy --config infra/fly.toml
# Secrets: fly secrets set ANTHROPIC_API_KEY=sk-ant-... --config infra/fly.toml

app = "emergency-ai"
primary_region = "iad"

[build]
  dockerfile = "../Dockerfile"

[env]
  # Non-secret runtime config
  PORT = "8080"
  LOG_LEVEL = "info"
  # Secrets must be set via fly secrets, never here:
  #   fly secrets set ANTHROPIC_API_KEY=sk-ant-...  --config infra/fly.toml
  #   fly secrets set REDIS_URL=redis://...          --config infra/fly.toml
  #   fly secrets set DATABASE_URL=postgres://...    --config infra/fly.toml

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"
    tls_skip_verify = false

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
