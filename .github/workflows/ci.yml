name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        env:
          EMERGENCY_AI_MOCK: "1"
          EMERGENCY_AI_NO_AUTH: "1"
        run: pytest -ra --tb=short

      - name: Check Alembic migrations
        env:
          DATABASE_URL: ""
        run: |
          # Only verify alembic config parses; skip if no DATABASE_URL
          python -c "
          import os
          db_url = os.environ.get('DATABASE_URL', '')
          if not db_url:
              print('No DATABASE_URL — skipping alembic check')
          else:
              import subprocess
              result = subprocess.run(['alembic', 'check'], capture_output=True, text=True)
              print(result.stdout)
              if result.returncode != 0:
                  print(result.stderr)
                  raise SystemExit(result.returncode)
          "

      - name: Lint with ruff
        run: ruff check src tests
