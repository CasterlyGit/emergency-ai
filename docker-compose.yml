version: "3.9"

services:
  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: emergency-ai:latest
    ports:
      - "8080:8080"
    environment:
      # Required: set this in your shell or a .env file before running
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      # Optional infrastructure — the service uses in-memory fallbacks if unset,
      # but the compose stack wires them up properly.
      REDIS_URL: "redis://redis:6379/0"
      DATABASE_URL: "postgresql+asyncpg://emergency:emergency@db:5432/emergency"
      # Bind to all interfaces inside the container
      HOST: "0.0.0.0"
      PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Redis (response cache) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Postgres (incident audit store) ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: emergency
      POSTGRES_PASSWORD: emergency
      POSTGRES_DB: emergency
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emergency -d emergency"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  pg_data:
